# 灵镜 AI 宿主机日志轮转配置
# 部署：cp scripts/logrotate.conf /etc/logrotate.d/lingjing
# 验证：logrotate -d /etc/logrotate.d/lingjing  （-d 是 dry-run 不实际写）
#
# 说明：
#   Docker 容器的 stdout/stderr 已通过 docker-compose 的 logging 块轮转（size=100m, max-file=3）
#   这里管的是 backend 自己写到宿主机的文件日志（one-api/data/logs/*.log）
#   以及脚本日志 /var/log/lj-backup.log

# 后端应用日志（oneapi-YYYYMMDD.log）
/root/lingjing-ai/one-api/data/logs/*.log {
    daily            # 每天轮转
    rotate 7         # 保留 7 份
    compress         # gzip 压缩旧日志（省空间）
    delaycompress    # 前一份先不压缩（方便刚出问题时 tail 查）
    missingok        # 文件不存在不报错
    notifempty       # 空文件不轮转
    copytruncate     # 不 rename，直接 truncate（因为容器里的进程持有 fd）
    dateext          # 命名加日期后缀
    dateformat -%Y%m%d
    su root root
}

# 备份脚本日志
/var/log/lj-backup.log {
    monthly
    rotate 6         # 保留 6 个月
    compress
    missingok
    notifempty
    create 640 root root
}

# Nginx 访问日志（如有）
/var/log/nginx/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    sharedscripts
    postrotate
        [ ! -f /var/run/nginx.pid ] || kill -USR1 `cat /var/run/nginx.pid`
    endscript
}
