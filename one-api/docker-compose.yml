services:
  one-api:
    image: lingjing-api:latest
    container_name: one-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - SQL_DSN=root:${MYSQL_PASSWORD}@tcp(mysql:3306)/oneapi
      - REDIS_CONN_STRING=redis://redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - api-net
    # 资源限制：防止 Go 服务异常泄漏吃光整机资源
    mem_limit: 4g
    mem_reservation: 512m
    cpus: "2.0"
    # 日志轮转：Docker 自带，单文件 100MB，保留 3 份 = 最多 300MB
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  mysql:
    image: mysql:8.0
    container_name: one-api-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: oneapi
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    # 基础调优：
    # - max_connections=500（AI 调用 holds 连接久，默认 151 不够）
    # - innodb_buffer_pool_size=2G（热点表全常驻内存，避免磁盘 IO 成瓶颈）
    # - 慢查询日志 >1s 打到 stderr，方便 docker logs 查
    command:
      - --max-connections=500
      - --innodb-buffer-pool-size=2G
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --slow-query-log=1
      - --slow-query-log-file=/var/lib/mysql/slow.log
      - --long-query-time=1
    volumes:
      - ./mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api-net
    mem_limit: 3g
    mem_reservation: 1g
    cpus: "1.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: one-api-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./redis-data:/data
    networks:
      - api-net
    mem_limit: 512m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"

networks:
  api-net:
    driver: bridge
