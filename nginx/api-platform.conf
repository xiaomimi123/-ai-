# 灵镜AI Nginx 配置参考
# 实际配置在 /etc/nginx/conf.d/api-platform.conf（由 certbot 管理 HTTPS）
#
# 域名分工：
#   aitoken.homes / www       → CF 橙云代理（治移动端劫持，承载页面）
#   api.aitoken.homes         → CF 灰云直连（API + SSE 流式 + 大文件，绕 CF 限制）
#   admin.aitoken.homes       → CF 灰云直连（管理后台，避免 CF WAF 误杀）

# === Cloudflare 真实 IP 透传（橙云域名才需要，include 一次全局生效）===
# 把这段放到 /etc/nginx/conf.d/cloudflare-realip.conf 单独维护
# IP 段来源：https://www.cloudflare.com/ips-v4
# set_real_ip_from 173.245.48.0/20;
# set_real_ip_from 103.21.244.0/22;
# set_real_ip_from 103.22.200.0/22;
# set_real_ip_from 103.31.4.0/22;
# set_real_ip_from 141.101.64.0/18;
# set_real_ip_from 108.162.192.0/18;
# set_real_ip_from 190.93.240.0/20;
# set_real_ip_from 188.114.96.0/20;
# set_real_ip_from 197.234.240.0/22;
# set_real_ip_from 198.41.128.0/17;
# set_real_ip_from 162.158.0.0/15;
# set_real_ip_from 104.16.0.0/13;
# set_real_ip_from 104.24.0.0/14;
# set_real_ip_from 172.64.0.0/13;
# set_real_ip_from 131.0.72.0/22;
# real_ip_header CF-Connecting-IP;
# real_ip_recursive on;

# 用户前台（橙云：CF → 服务器）
server {
    listen 80;
    server_name aitoken.homes www.aitoken.homes;
    root /var/www/api-platform/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
    # index.html 必须每次问最新：否则用户拿到的旧 index.html 会引用旧 hash 的 JS，
    # 永远拉不到刚部署的新版前端，前端修复对老用户全部失效
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    # 兜底：旧版前端 / 第三方误用主域名打 API 时仍可用（新前端走 api 子域名）
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /v1/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }
}

# === API 子域名（灰云直连：保 SSE + 无上传上限 + 低延迟）===
server {
    listen 80;
    server_name api.aitoken.homes;

    # 不限上传大小（绕开 CF 100MB 上限）
    client_max_body_size 0;

    # 仅 API 域名，根路径无意义，跳回主站
    location = / {
        return 302 https://aitoken.homes/;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE 流式聊天接口必须关缓冲
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # 其他路径一律 404，避免暴露
    location / {
        return 404;
    }
}

# 管理后台（灰云直连）
server {
    listen 80;
    server_name admin.aitoken.homes;
    root /var/www/api-platform/admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
    # index.html 不缓存，否则部署新前端用户感知不到（老 hash 永远拉不到）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
