# 灵镜AI Nginx 配置参考
# 实际配置在 /etc/nginx/conf.d/api-platform.conf（由 certbot 管理 HTTPS）

# 用户前台
server {
    listen 80;
    server_name aitoken.homes www.aitoken.homes;
    root /var/www/api-platform/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
    # index.html 必须每次问最新：否则用户拿到的旧 index.html 会引用旧 hash 的 JS，
    # 永远拉不到刚部署的新版前端，前端修复对老用户全部失效
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /v1/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }
}

# 管理后台
server {
    listen 80;
    server_name admin.aitoken.homes;
    root /var/www/api-platform/admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
    # index.html 不缓存，否则部署新前端用户感知不到（老 hash 永远拉不到）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
